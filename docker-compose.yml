version: "3.9"

services:

  backend:
    build: ./backend
    container_name: resumeiq_backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    restart: unless-stopped

    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: resumeiq_frontend

    depends_on:
      - backend

    ports:
      - "5173:80"

    restart: unless-stopped